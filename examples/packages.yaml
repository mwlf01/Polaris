# Polaris – Package Examples
#
# This file demonstrates all three package sources.
# Include it from your main config:
#   includes:
#     - packages.yaml

packages:
  # ── WinGet ──────────────────────────────────────
  - name: Mozilla Firefox
    id: Mozilla.Firefox
    source: winget
    state: present

  - name: 7-Zip
    id: 7zip.7zip
    source: winget
    state: present

  - name: Notepad++
    id: Notepad++.Notepad++
    source: winget
    state: present

  - name: VLC Media Player
    id: VideoLAN.VLC
    source: winget
    state: present

  # Pin a specific version
  - name: Node.js LTS
    id: OpenJS.NodeJS.LTS
    source: winget
    version: "20.10.0"
    state: present

  # ── Microsoft Store ─────────────────────────────
  # Product ID from the Store URL: https://apps.microsoft.com/detail/<ID>
  - name: Microsoft Whiteboard
    id: 9MSPC6MP8FM4
    source: msstore
    state: present

  # ── Chocolatey ──────────────────────────────────
  # Chocolatey is auto-installed via WinGet if needed.
  # Find IDs: choco search <term> or community.chocolatey.org/packages
  - name: Git
    id: git
    source: choco
    state: present

  # ── Remove a package ────────────────────────────
  # - name: Unwanted App
  #   id: Publisher.UnwantedApp
  #   source: winget
  #   state: absent
